name: deckoala

services:
  app:
    build: .
    image: deckoala:local
    container_name: deckoala-app
    ports:
      - "${DECKOALA_PORT:-8321}:8080"
    environment:
      DECKOALA_ALLOW_SIGNUP: "${DECKOALA_ALLOW_SIGNUP:-true}"
      DECKOALA_SECURE_COOKIE: "${DECKOALA_SECURE_COOKIE:-false}"
      DECKOALA_PUBLIC_URL: "${DECKOALA_PUBLIC_URL:-}"
      # Password for the seeded bootstrap admin `root`, applied only on a first
      # start with an empty database. Leave blank to use the built-in default.
      DECKOALA_ROOT_PASSWORD: "${DECKOALA_ROOT_PASSWORD:-}"
    volumes:
      - deckoala-data:/data
    networks:
      - deckoala-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/deckoala-server", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  deckoala-data:

networks:
  deckoala-net:
