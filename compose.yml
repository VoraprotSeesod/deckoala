name: deckoala

services:
  app:
    build: .
    image: deckoala:local
    container_name: deckoala-app
    ports:
      - "${DECKOALA_PORT:-8321}:8080"
    volumes:
      - deckoala-data:/data
    networks:
      - deckoala-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/deckoala-server", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  deckoala-data:

networks:
  deckoala-net:
