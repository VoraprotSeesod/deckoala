<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>Deckoala — brand preview</title>
<style>
  body { font-family: system-ui, sans-serif; background: #F8F8FF; color: #0B1215; margin: 24px; }
  .row { display: flex; align-items: flex-end; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
  .cell { text-align: center; }
  .cell small { display: block; margin-top: 4px; color: #667; }
  .dark { background: #0B1215; color: #F8F8FF; padding: 16px; border-radius: 8px; }
  .dark small { color: #99a; }
  h1 { font-size: 20px; display: flex; align-items: center; gap: 10px; }
  h1 img { width: 32px; height: 32px; }
  h2 { margin: 24px 0 8px; font-size: 16px; }
</style>
</head>
<body>
  <h1><img src="../../../assets/brand/logo.svg" alt=""> Deckoala — brand preview</h1>

  <h2>โลโก้บนพื้น #F8F8FF (ทุกขนาด)</h2>
  <div class="row">
    <div class="cell"><img src="../../../assets/brand/logo.svg" width="256" height="256"><small>256</small></div>
    <div class="cell"><img src="../../../assets/brand/logo.svg" width="128" height="128"><small>128</small></div>
    <div class="cell"><img src="../../../assets/brand/logo.svg" width="64" height="64"><small>64</small></div>
    <div class="cell"><img src="../../../assets/brand/logo.svg" width="32" height="32"><small>32</small></div>
    <div class="cell"><img src="../../../assets/brand/logo.svg" width="16" height="16"><small>16 (favicon)</small></div>
  </div>

  <h2>เวอร์ชันพื้นเข้ม (logo-dark.svg)</h2>
  <div class="row dark">
    <div class="cell"><img src="../../../assets/brand/logo-dark.svg" width="128" height="128"><small>128</small></div>
    <div class="cell"><img src="../../../assets/brand/logo-dark.svg" width="32" height="32"><small>32</small></div>
  </div>

  <h2>สี brand</h2>
  <div class="row">
    <div class="cell"><div style="width:96px;height:64px;background:#F8F8FF;border:1px solid #ccc;border-radius:8px"></div><small>#F8F8FF พื้นหลัง</small></div>
    <div class="cell"><div style="width:96px;height:64px;background:#0B1215;border-radius:8px"></div><small>#0B1215 ตัวอักษร</small></div>
  </div>
</body>
</html>
